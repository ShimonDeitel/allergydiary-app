name: AllergyDiary
options:
  bundleIdPrefix: com.shimondeitel.allergydiary
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  AllergyDiary:
    type: application
    platform: iOS
    sources:
      - path: AllergyDiary
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.allergydiary
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: AllergyDiary/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  AllergyDiaryTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AllergyDiaryTests
      - path: AllergyDiary.storekit
    dependencies:
      - target: AllergyDiary
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.allergydiary.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  AllergyDiaryUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: AllergyDiaryUITests
    dependencies:
      - target: AllergyDiary
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.allergydiary.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  AllergyDiary:
    build:
      targets:
        AllergyDiary: all
        AllergyDiaryTests: [test]
        AllergyDiaryUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: AllergyDiary.storekit
    test:
      config: Debug
      storeKitConfiguration: AllergyDiary.storekit
      targets:
        - AllergyDiaryTests
        - AllergyDiaryUITests
    archive:
      config: Release
